name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: pip install '.[dev]'
      - run: python -m pytest tests/

  docs:
    name: Deploy docs
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install '.[dev]'
          pip install Sphinx sphinxcontrib-fulltoc sphinx_bootstrap_theme

      - name: Generate API docs
        run: |
          sphinx-apidoc -f -e -d 4 -o ./docs/api_docs ./honeybee_ph
          sphinx-apidoc -f -e -d 4 -o ./docs/api_docs ./honeybee_energy_ph
          sphinx-apidoc -f -e -d 4 -o ./docs/api_docs ./honeybee_phhvac
          sphinx-apidoc -f -e -d 4 -o ./docs/api_docs ./honeybee_ph_utils
          sphinx-apidoc -f -e -d 4 -o ./docs/api_docs ./honeybee_ph_standards

      - name: Build HTML
        run: sphinx-build -b html ./docs/api_docs ./docs/api_docs/_build/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/api_docs/_build/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  bump-and-release:
    name: Bump version and publish
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install bump-my-version build

      - name: Determine version bump
        id: bump_level
        uses: actions/github-script@v8
        with:
          script: |
            const commits = context.payload.commits || [];
            const mergeCommit = commits.find(c => c.message.startsWith('Merge pull request'));
            if (mergeCommit) {
              const match = mergeCommit.message.match(/#(\d+)/);
              if (match) {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: parseInt(match[1])
                });
                const labels = pr.data.labels.map(l => l.name);
                if (labels.includes('bump:major')) {
                  core.setOutput('level', 'major');
                  return;
                }
                if (labels.includes('bump:minor')) {
                  core.setOutput('level', 'minor');
                  return;
                }
              }
            }
            core.setOutput('level', 'patch');

      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bump-my-version bump ${{ steps.bump_level.outputs.level }}
          echo "new_version=$(bump-my-version show current_version)" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
